services:
  - type: web
    name: magicpin-ai-challenge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COMPOSER_MODE
        value: llm
      - key: REPLY_MODE
        value: llm
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
